apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
    spec:
      imagePullSecrets:
        - name: tencent-ccr-secret
      containers:
        - name: chromadb
          image: chromadb/chroma
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
            - name: CHROMA_SERVER_AUTHN_PROVIDER
              value: "chromadb.auth.token_authn.TokenAuthenticationServerProvider"
            - name: CHROMA_SERVER_AUTHN_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: chroma-credentials
                  key: chroma-token
            - name: CHROMA_AUTH_TOKEN_TRANSPORT_HEADER
              value: "Authorization"
          volumeMounts:
            - name: chromadb-storage
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          # 健康检查改为TCP Socket探测，因为启用了Token认证，健康检查的API也要认证
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: chromadb-storage
          persistentVolumeClaim:
            claimName: chromadb-data
