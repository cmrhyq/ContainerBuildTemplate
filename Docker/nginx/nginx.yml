version: '3.6'
services:
  nginx-01:
    container_name: nginx-01
    image: nginx
    restart: always
    privileged: true
    environment:
      TZ: 'Asia/Shanghai'
    network_mode: "host"
    volumes:
      - /opt/docker/data/nginx/conf:/etc/nginx
      - /opt/docker/data/nginx/web:/usr/share/nginx
      - /opt/docker/data/nginx/logs:/var/log/nginx
      - /etc/localtime:/etc/localtime
